<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alianza de Oro - Operaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700;900&display=swap');

        :root {
            --neon-gold: #FFD700;
            --neon-blue: #00F2FF;
            --dark-bg: #0a0a0c;
        }

        body {
            background-color: var(--dark-bg);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }

        .user-btn {
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-btn.active {
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .qty-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            border-radius: 8px;
            width: 50px;
            font-weight: bold;
        }

        .submit-btn {
            background: linear-gradient(90deg, var(--neon-blue), #00a2ff);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        /* Estilo minimalista para scroll */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <!-- Navbar Minimalista -->
    <nav class="p-6 border-b border-white/5 bg-black/20">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="orbitron text-xl font-bold tracking-tighter text-white">ALIANZA <span class="text-[#FFD700]">GOLD</span></h1>
                <p class="text-[8px] uppercase tracking-widest text-cyan-500 font-bold">Panel de Rendimiento</p>
            </div>
            <div class="text-right">
                <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Días de Juego</p>
                <div class="bg-white/5 px-3 py-1 rounded-lg border border-white/10 inline-block">
                    <span id="daysLeft" class="orbitron text-sm font-bold text-white">00</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 mt-8 space-y-8">

        <!-- Selector de Persona -->
        <section>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="selectUser('Jean Carlos')" id="u-Jean Carlos" class="user-btn glass-card p-4 text-center">
                    <p class="text-xs font-bold uppercase tracking-widest">Jean Carlos</p>
                </button>
                <button onclick="selectUser('Rina')" id="u-Rina" class="user-btn glass-card p-4 text-center">
                    <p class="text-xs font-bold uppercase tracking-widest">Rina</p>
                </button>
                <button onclick="selectUser('Pablo')" id="u-Pablo" class="user-btn glass-card p-4 text-center">
                    <p class="text-xs font-bold uppercase tracking-widest">Pablo</p>
                </button>
            </div>
        </section>

        <!-- Panel de Carga por Sesión -->
        <section id="sessionPanel" class="hidden animate-fade-in">
            <div class="flex justify-between items-end mb-4 px-1">
                <h2 class="orbitron text-[10px] font-bold text-cyan-400 uppercase tracking-[0.2em]">Registro de Sesión</h2>
                <span id="activeName" class="text-[10px] text-yellow-500 font-bold uppercase"></span>
            </div>

            <div id="tasksList" class="space-y-2 mb-6">
                <!-- Se inyectan tareas con inputs -->
            </div>

            <button onclick="submitSession()" class="submit-btn w-full py-5 rounded-2xl shadow-lg">
                Subir Puntos de la Sesión
            </button>
        </section>

        <!-- Gráfica de Resultados -->
        <section class="glass-card p-6">
            <h2 class="orbitron text-[10px] font-bold mb-6 uppercase tracking-widest text-center">Tabla de Posiciones</h2>
            <canvas id="rankingChart" height="200"></canvas>
            
            <div id="leaderboard" class="mt-8 space-y-3">
                <!-- Ranked List -->
            </div>
        </section>

        <!-- Utilidades -->
        <footer class="flex justify-between items-center px-2 opacity-20 hover:opacity-100 transition-opacity">
            <button onclick="downloadCSV()" class="text-[9px] font-bold uppercase"><i class="fas fa-download mr-1"></i> Exportar CSV</button>
            <button onclick="resetStats()" class="text-[9px] font-bold uppercase text-red-500"><i class="fas fa-trash mr-1"></i> Reiniciar</button>
        </footer>

    </main>

    <!-- Notificación Minimal -->
    <div id="notif" class="fixed top-10 left-1/2 -translate-x-1/2 bg-cyan-600 text-black px-6 py-3 rounded-full font-black text-[10px] uppercase shadow-2xl hidden z-50"></div>

    <script>
        // CONFIGURACIÓN DE TAREAS Y PUNTOS ACTUALIZADOS
        const CONFIG = {
            "Rina": [
                { id: 'r1', name: 'Llamar al cliente', pts: 2 },
                { id: 'r2', name: 'Colilla', pts: 2 },
                { id: 'r3', name: 'Explicar preinforme', pts: 1 },
                { id: 'r4', name: 'Vender una auditoría', pts: 9 },
                { id: 'r5', name: 'Cerrar crédito', pts: 9 },
                { id: 'r6', name: 'Venta de otros producto', pts: 7 },
                { id: 'r7', name: 'Actualizar base de datos', pts: 8 }
            ],
            "Jean Carlos": [
                { id: 'j1', name: 'Mensajes cliente potencial', pts: 1 },
                { id: 'j2', name: 'Colilla técnica', pts: 3 },
                { id: 'j3', name: 'Hacer preinforme', pts: 1 },
                { id: 'j4', name: 'Crear radiografia', pts: 4 },
                { id: 'j5', name: 'Montar y perfilar crédito', pts: 5 },
                { id: 'j6', name: 'Monitoreo del crédito', pts: 7 },
                { id: 'j7', name: 'Venta de otros producto', pts: 7 },
                { id: 'j8', name: 'Actualizar base de datos', pts: 8 },
                { id: 'j9', name: 'Venta de Auditoría', pts: 9 } // NUEVA TAREA
            ],
            "Pablo": [
                { id: 'p1', name: 'Traer cliente', pts: 9 },
                { id: 'p2', name: 'Mensajes cliente potencial', pts: 1 },
                { id: 'p3', name: 'Venta de otros producto', pts: 7 },
                { id: 'p4', name: 'Hacer pago', pts: 3 },
                { id: 'p5', name: 'Actualizar base de datos', pts: 8 }
            ]
        };

        let activeUser = null;
        let chart = null;
        let db = JSON.parse(localStorage.getItem('alianza_final_v35')) || {
            "Jean Carlos": 0, "Rina": 0, "Pablo": 0, history: []
        };

        window.onload = () => {
            updateDays();
            renderChart();
            renderLeaderboard();
        };

        function updateDays() {
            const now = new Date();
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            document.getElementById('daysLeft').innerText = (lastDay - now.getDate()).toString().padStart(2, '0');
        }

        function selectUser(user) {
            activeUser = user;
            document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`u-${user}`).classList.add('active');
            
            document.getElementById('activeName').innerText = user;
            const container = document.getElementById('tasksList');
            container.innerHTML = '';
            
            CONFIG[user].forEach(task => {
                container.innerHTML += `
                    <div class="flex justify-between items-center p-3 glass-card bg-white/[0.02]">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-white uppercase">${task.name}</span>
                            <span class="text-[8px] text-gray-500 font-bold">${task.pts} PTS</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="changeVal('${task.id}', -1)" class="w-8 h-8 rounded bg-white/5 border border-white/10 font-bold text-white">-</button>
                            <input type="number" id="input-${task.id}" value="0" min="0" class="qty-input py-1 text-sm outline-none">
                            <button onclick="changeVal('${task.id}', 1)" class="w-8 h-8 rounded bg-white/5 border border-white/10 font-bold text-white">+</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('sessionPanel').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('sessionPanel').offsetTop - 20, behavior: 'smooth' });
        }

        function changeVal(id, delta) {
            const el = document.getElementById(`input-${id}`);
            let val = parseInt(el.value) + delta;
            el.value = val < 0 ? 0 : val;
        }

        function submitSession() {
            if (!activeUser) return;
            
            let totalSessionPts = 0;
            let registeredAny = false;

            CONFIG[activeUser].forEach(task => {
                const qty = parseInt(document.getElementById(`input-${task.id}`).value);
                if (qty > 0) {
                    const pts = qty * task.pts;
                    totalSessionPts += pts;
                    db.history.push({
                        user: activeUser,
                        task: task.name,
                        qty: qty,
                        pts: pts,
                        date: new Date().toLocaleString()
                    });
                    registeredAny = true;
                }
            });

            if (!registeredAny) return showNotif("⚠️ No has marcado ninguna tarea");

            db[activeUser] += totalSessionPts;
            localStorage.setItem('alianza_final_v35', JSON.stringify(db));
            
            showNotif(`🚀 +${totalSessionPts} puntos registrados`);
            renderChart();
            renderLeaderboard();
            
            // Reset inputs
            document.querySelectorAll('.qty-input').forEach(i => i.value = 0);
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';
            const sorted = ["Jean Carlos", "Rina", "Pablo"].sort((a,b) => db[b] - db[a]);
            
            sorted.forEach((u, i) => {
                container.innerHTML += `
                    <div class="flex justify-between items-center p-4 glass-card bg-white/[0.01]">
                        <div class="flex items-center gap-4">
                            <span class="orbitron text-xs font-black ${i === 0 ? 'text-yellow-500' : 'text-gray-600'}">${i+1}</span>
                            <span class="text-[10px] font-black uppercase tracking-widest">${u}</span>
                        </div>
                        <span class="text-xs font-black text-cyan-400">${db[u]} <span class="text-[8px] text-gray-500">PTS</span></span>
                    </div>
                `;
            });
        }

        function renderChart() {
            const ctx = document.getElementById('rankingChart').getContext('2d');
            const data = [db['Jean Carlos'], db['Rina'], db['Pablo']];
            if (chart) { chart.data.datasets[0].data = data; chart.update(); return; }

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['JEAN C.', 'RINA', 'PABLO'],
                    datasets: [{
                        data: data,
                        backgroundColor: ['#00F2FF', '#FFD700', '#555'],
                        borderRadius: 8,
                        barThickness: 30
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { display: false }, 
                        x: { grid: { display: false }, ticks: { color: '#666', font: { family: 'Orbitron', size: 9 } } }
                    }
                }
            });
        }

        function showNotif(msg) {
            const n = document.getElementById('notif');
            n.innerText = msg;
            n.classList.remove('hidden');
            setTimeout(() => n.classList.add('hidden'), 3000);
        }

        function downloadCSV() {
            let csv = "\uFEFFFecha,Usuario,Tarea,Cantidad,Puntos\n";
            db.history.forEach(h => csv += `${h.date},${h.user},${h.task},${h.qty},${h.pts}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url); a.setAttribute('download', 'Reporte_Alianza.csv');
            a.click();
        }

        function resetStats() {
            if (confirm("¿Reiniciar mes?")) {
                localStorage.removeItem('alianza_final_v35');
                location.reload();
            }
        }
    </script>
</body>
</html>
