<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alianza de Oro - Cloud Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700;900&display=swap');
        :root { --neon-gold: #FFD700; --neon-blue: #00F2FF; --dark-bg: #0a0a0c; }
        body { background-color: var(--dark-bg); color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; }
        .user-btn { transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.1); }
        .user-btn.active { border-color: var(--neon-blue); background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        .qty-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; text-align: center; border-radius: 8px; width: 60px; font-weight: bold; }
        .submit-btn { background: linear-gradient(90deg, var(--neon-blue), #00a2ff); color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .cloud-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .offline { background: #ef4444; }
    </style>
</head>
<body class="pb-20">

    <!-- Navbar -->
    <nav class="p-6 border-b border-white/5 bg-black/40">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="orbitron text-xl font-bold text-white">ALIANZA <span class="text-gold">GOLD</span></h1>
                <p class="text-[8px] uppercase tracking-widest text-cyan-500 font-bold">
                    <span id="cloudStatus" class="cloud-dot offline"></span> Sincronización en Nube v4.2
                </p>
            </div>
            <div class="text-right bg-white/5 px-3 py-1 rounded-lg border border-white/10">
                <p class="text-[7px] text-gray-500 uppercase font-bold mb-0">Días de Cierre</p>
                <span id="daysLeft" class="orbitron text-sm font-bold text-white leading-none">00</span>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 mt-8 space-y-8">

        <!-- Selector de Persona -->
        <section class="grid grid-cols-3 gap-2">
            <button onclick="selectUser('Jean Carlos')" id="u-Jean Carlos" class="user-btn glass-card p-4 text-center">
                <p class="text-[10px] font-black uppercase tracking-widest">Jean Carlos</p>
            </button>
            <button onclick="selectUser('Rina')" id="u-Rina" class="user-btn glass-card p-4 text-center">
                <p class="text-[10px] font-black uppercase tracking-widest">Rina</p>
            </button>
            <button onclick="selectUser('Pablo')" id="u-Pablo" class="user-btn glass-card p-4 text-center">
                <p class="text-[10px] font-black uppercase tracking-widest">Pablo</p>
            </button>
        </section>

        <!-- Panel de Carga por Sesión -->
        <section id="sessionPanel" class="hidden">
            <div class="flex justify-between items-end mb-4 px-1">
                <h2 class="orbitron text-[9px] font-bold text-cyan-400 uppercase tracking-widest italic">Tareas del Día</h2>
                <span id="activeName" class="text-[10px] text-yellow-500 font-black uppercase"></span>
            </div>
            <div id="tasksList" class="space-y-2 mb-6"></div>
            <button id="mainBtn" onclick="submitSession()" class="submit-btn w-full py-5 rounded-2xl shadow-lg">Sincronizar Sesión Completa</button>
        </section>

        <!-- Tabla de Motivación Real-Time -->
        <section class="glass-card p-6">
            <h2 class="orbitron text-[10px] font-bold mb-6 uppercase tracking-widest text-center text-gray-500 italic">Métricas del Equipo</h2>
            <canvas id="rankingChart" height="200"></canvas>
            <div id="leaderboard" class="mt-8 space-y-3"></div>
        </section>

        <!-- Herramientas de Pablo (ADMIN) -->
        <footer id="adminTools" class="hidden flex flex-col gap-3 border-t border-white/5 pt-6 opacity-40 hover:opacity-100 transition-opacity">
            <button onclick="downloadCSV()" class="text-[9px] font-bold uppercase text-cyan-400 p-3 border border-cyan-400/20 rounded-xl">
                <i class="fas fa-file-download mr-1"></i> Exportar Historial (Solo Pablo)
            </button>
            <button onclick="resetStats()" class="text-[9px] font-bold uppercase text-red-600 p-2">
                <i class="fas fa-trash-alt mr-1"></i> Reiniciar Marcadores del Mes
            </button>
        </footer>

    </main>

    <div id="notif" class="fixed top-5 left-1/2 -translate-x-1/2 bg-cyan-600 text-black px-6 py-3 rounded-full font-black text-[10px] uppercase shadow-2xl hidden z-50"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- CONFIGURACIÓN DE FIREBASE DE PABLO ---
        const firebaseConfig = {
            apiKey: "AIzaSyAu2sn2F4NGovjpYYUb6lTVY_TiK-jphDU",
            authDomain: "alianzascore-ae501.firebaseapp.com",
            projectId: "alianzascore-ae501",
            storageBucket: "alianzascore-ae501.firebasestorage.app",
            messagingSenderId: "398110680112",
            appId: "1:398110680112:web:11ad357b9b34c44460b9f5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'alianza-v4';

        // Intentar conexión
        signInAnonymously(auth).then(() => {
            document.getElementById('cloudStatus').classList.replace('offline', 'online');
            startSync(db, appId);
        }).catch(err => {
            console.error("Error Auth: ", err);
            showNotif("⚠️ Error: Activa 'Anónimo' en Firebase > Authentication");
        });

        const CONFIG = {
            "Rina": [
                { id: 'r1', name: 'Llamar al cliente', pts: 2 },
                { id: 'r2', name: 'Colilla', pts: 2 },
                { id: 'r3', name: 'Explicar preinforme', pts: 1 },
                { id: 'r4', name: 'Vender auditoría', pts: 9 },
                { id: 'r5', name: 'Cerrar crédito', pts: 9 },
                { id: 'r6', name: 'Venta otros producto', pts: 7 },
                { id: 'r7', name: 'Actualizar base de datos', pts: 8 }
            ],
            "Jean Carlos": [
                { id: 'j1', name: 'Mensajes potencial', pts: 1 },
                { id: 'j2', name: 'Colilla técnica', pts: 3 },
                { id: 'j3', name: 'Hacer preinforme', pts: 1 },
                { id: 'j4', name: 'Crear radiografia', pts: 4 },
                { id: 'j5', name: 'Montar/Perfilar crédito', pts: 5 },
                { id: 'j6', name: 'Monitoreo crédito', pts: 7 },
                { id: 'j7', name: 'Venta otros producto', pts: 7 },
                { id: 'j8', name: 'Actualizar base de datos', pts: 8 },
                { id: 'j9', name: 'Venta de Auditoría', pts: 9 }
            ],
            "Pablo": [
                { id: 'p1', name: 'Traer cliente', pts: 9 },
                { id: 'p2', name: 'Mensajes potencial', pts: 1 },
                { id: 'p3', name: 'Venta otros producto', pts: 7 },
                { id: 'p4', name: 'Hacer pago', pts: 3 },
                { id: 'p5', name: 'Actualizar base de datos', pts: 8 }
            ]
        };

        let activeUser = null;
        let chart = null;
        let globalHistory = [];
        let globalTotals = { "Jean Carlos": 0, "Rina": 0, "Pablo": 0 };

        function startSync(db, appId) {
            const historyCol = collection(db, 'artifacts', appId, 'public', 'data', 'history');
            onSnapshot(historyCol, (snapshot) => {
                globalHistory = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                globalTotals = { "Jean Carlos": 0, "Rina": 0, "Pablo": 0 };
                globalHistory.forEach(e => {
                    if(globalTotals.hasOwnProperty(e.user)) globalTotals[e.user] += e.pts;
                });
                renderChart();
                renderLeaderboard();
            }, (error) => {
                console.error("Snapshot error:", error);
                showNotif("⚠️ Error: Crea la base de datos en Firestore (Modo Prueba)");
            });
        }

        window.selectUser = (user) => {
            activeUser = user;
            document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`u-${user}`).classList.add('active');
            
            // Solo Pablo ve el Admin
            const adminTools = document.getElementById('adminTools');
            if (user === 'Pablo') adminTools.classList.remove('hidden');
            else adminTools.classList.add('hidden');

            document.getElementById('activeName').innerText = user;
            const container = document.getElementById('tasksList');
            container.innerHTML = '';
            CONFIG[user].forEach(task => {
                container.innerHTML += `
                    <div class="flex justify-between items-center p-3 glass-card bg-white/[0.01]">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold uppercase text-white">${task.name}</span>
                            <span class="text-[8px] text-gray-500 font-bold">${task.pts} PTS</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="window.changeVal('${task.id}', -1)" class="w-8 h-8 rounded bg-white/5 border border-white/10 font-bold text-white">-</button>
                            <input type="number" id="input-${task.id}" value="0" min="0" class="qty-input">
                            <button onclick="window.changeVal('${task.id}', 1)" class="w-8 h-8 rounded bg-white/5 border border-white/10 font-bold text-white">+</button>
                        </div>
                    </div>`;
            });
            document.getElementById('sessionPanel').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('sessionPanel').offsetTop - 20, behavior: 'smooth' });
        };

        window.changeVal = (id, delta) => {
            const el = document.getElementById(`input-${id}`);
            el.value = Math.max(0, parseInt(el.value) + delta);
        };

        window.submitSession = async () => {
            if (!activeUser) return;
            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.innerText = "Sincronizando...";
            
            const historyCol = collection(db, 'artifacts', appId, 'public', 'data', 'history');
            
            let promises = [];
            CONFIG[activeUser].forEach(task => {
                const qty = parseInt(document.getElementById(`input-${task.id}`).value);
                if (qty > 0) {
                    promises.push(addDoc(historyCol, {
                        user: activeUser, task: task.name, qty, pts: qty * task.pts,
                        timestamp: new Date().toISOString(), dateStr: new Date().toLocaleString()
                    }));
                }
            });

            if (promises.length === 0) {
                showNotif("⚠️ No has marcado nada");
                btn.disabled = false;
                btn.innerText = "Sincronizar Sesión Completa";
                return;
            }

            try {
                await Promise.all(promises);
                showNotif("🚀 PUNTOS SUBIDOS A LA NUBE");
                document.querySelectorAll('.qty-input').forEach(i => i.value = 0);
            } catch (e) {
                showNotif("❌ Error al subir datos");
            } finally {
                btn.disabled = false;
                btn.innerText = "Sincronizar Sesión Completa";
            }
        };

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';
            ["Jean Carlos", "Rina", "Pablo"].sort((a,b) => globalTotals[b] - globalTotals[a]).forEach((u, i) => {
                container.innerHTML += `
                    <div class="flex justify-between items-center p-4 glass-card ${i===0 ? 'border-yellow-500/30 bg-yellow-500/5' : ''}">
                        <div class="flex items-center gap-4">
                            <span class="orbitron text-xs font-black ${i===0 ? 'text-yellow-500' : 'text-gray-600'}">${i+1}</span>
                            <span class="text-[10px] font-black uppercase tracking-widest">${u}</span>
                        </div>
                        <span class="text-xs font-black text-cyan-400">${globalTotals[u]} <span class="text-[8px] text-gray-500 uppercase">pts</span></span>
                    </div>`;
            });
        }

        function renderChart() {
            const ctx = document.getElementById('rankingChart').getContext('2d');
            const data = [globalTotals['Jean Carlos'], globalTotals['Rina'], globalTotals['Pablo']];
            if (chart) { chart.data.datasets[0].data = data; chart.update(); return; }
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['JEAN C.', 'RINA', 'PABLO'],
                    datasets: [{ data, backgroundColor: ['#00F2FF', '#FFD700', '#444'], borderRadius: 10, barThickness: 30 }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#666', font: { family: 'Orbitron', size: 9 } } } } }
            });
        }

        window.downloadCSV = () => {
            if (globalHistory.length === 0) return showNotif("Sin datos registrados");
            let csv = "\uFEFFFecha,Usuario,Tarea,Cant,Pts\n";
            globalHistory.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).forEach(h => {
                csv += `${h.dateStr},${h.user},${h.task},${h.qty},${h.pts}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `Alianza_Cierre_Mes.csv`; a.click();
        };

        window.resetStats = async () => {
            if (!confirm("⚠️ ¿REINICIAR MES? Se borrará todo en la nube para todos.")) return;
            const historyCol = collection(db, 'artifacts', appId, 'public', 'data', 'history');
            const snapshot = await getDocs(historyCol);
            await Promise.all(snapshot.docs.map(d => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'history', d.id))));
            location.reload();
        };

        function showNotif(msg) {
            const n = document.getElementById('notif'); n.innerText = msg; n.classList.remove('hidden');
            setTimeout(() => n.classList.add('hidden'), 3000);
        }

        const now = new Date();
        document.getElementById('daysLeft').innerText = (new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - now.getDate()).toString().padStart(2, '0');
    </script>
</body>
</html>
